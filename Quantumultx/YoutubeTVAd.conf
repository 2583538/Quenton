########################################
# 应用名称： Youtube Block AD (TV Fix Version)
# 脚本作者： @DivineEngine, @app2smile, @Maasea, @VirgilClyne
# 更新时间： 2026-06-28
# 使用说明： 用于视频、瀑布流、搜索、播放页、短视频及贴片广告、视频自动PIP、后台播放、自动翻译。
# 特别说明： 已添加图片白名单，解决 TV 端图标/封面加载失败（显示黑框/叉）的问题。
# 隐藏技能： 点开 Youtube 视频的瞬间，退出 APP，即可无 PIP 播放，适合单纯听音频的用户。
########################################

# [关键] 域名集合：必须包含 ggpht.com 和 ytimg.com 以允许重写规则生效
hostname = -redirector*.googlevideo.com, *.googlevideo.com, www.youtube.com, s.youtube.com, youtubei.googleapis.com, *.ggpht.com, *.ytimg.com

# ======= [修复] 强制放行 YouTube 图片资源 ======= #
# 说明：使用 reject-dict 的反向逻辑或直接不拦截。
# 在 QX 重写中，若要确保某些资源不被其他规则误杀，通常不需要显式写“放行”，
# 但为了对抗全局去广告规则，可以使用 url-echo 返回空或者直接留空。
# 这里最稳妥的方式是利用 QX 的优先级机制，或者确保下面没有针对图片的 reject 规则。
# *注意*：QX 重写没有直接的 "ignore" 指令。如果是因为其他模块拦截了图片，
# 请在 [filter_remote] 或 [rewrite_remote] 中调整优先级。
# 针对 TV 端图标问题，通常是因为拦截了 ggpht 的请求。
# 下面的规则是为了防止误拦截（如果配合其他强力去广告脚本使用）：

# 如果你使用了全局去广告，请确保以下域名在 Whitelist 中，或者不要对以下域名执行 reject：
# *.ggpht.com
# *.ytimg.com

# ======= 视频广告请求拦截 ======= #
# 拦截移动端/TV端视频流中的广告片段
^https?:\/\/.*\.googlevideo\.com\/videoplayback.*&oad - reject-dict
^https?:\/\/.*\.googlevideo\.com\/videoplayback.*&c=WEB - reject-dict

# ======= YouTube App 内部广告接口拦截 ======= #
# 拦截首页推荐广告、搜索广告等
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/browse - reject-dict
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/search - reject-dict
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/next - reject-dict
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/reel\/reel_watch_sequence - reject-dict
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player - reject-dict

# ======= 移除播放器内的覆盖层广告 (如购物链接、投票等) ======= #
# 需要配合 Script 脚本使用效果更好，纯 Rewrite 只能做到这一步
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player - script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/youtube-player.js, requires-body=true, timeout=30, tag=YouTube-Player-Fix
