########################################
# 应用名称： Youtube Block AD (Clean Version)
# 脚本作者： @DivineEngine, @app2smile, @Maasea, @VirgilClyne
# 更新时间： 2026-06-28
# 使用说明： 用于视频、瀑布流、搜索、播放页、短视频及贴片广告、视频自动PIP、后台播放、自动翻译。
# 修复说明： 已移除无效语法，解决解析报错问题。
########################################

# [关键] 域名集合：必须包含 ggpht.com 和 ytimg.com 以允许重写规则生效
hostname = -redirector*.googlevideo.com, *.googlevideo.com, www.youtube.com, s.youtube.com, youtubei.googleapis.com, *.ggpht.com, *.ytimg.com

# ======= 视频广告请求 ======= #
^https:\/\/www\.youtube\.com\/youtubei\/v1\/browse url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js
^https:\/\/www\.youtube\.com\/youtubei\/v1\/next url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js
^https:\/\/www\.youtube\.com\/youtubei\/v1\/player url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js
^https:\/\/www\.youtube\.com\/youtubei\/v1\/search url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js
^https:\/\/www\.youtube\.com\/youtubei\/v1\/guide url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js
^https:\/\/www\.youtube\.com\/youtubei\/v1\/reel\/reel_watch_sequence url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js
^https:\/\/www\.youtube\.com\/youtubei\/v1\/get_watch url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube.js

# ======= 屏蔽 Shorts 短视频 (可选，不需要可注释掉) ======= #
# ^https:\/\/www\.youtube\.com\/youtubei\/v1\/browse url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube-shorts.js

# ======= 屏蔽 PIP 画中画 (可选，不需要可注释掉) ======= #
# ^https:\/\/www\.youtube\.com\/youtubei\/v1\/player url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/youtube-pip.js
